name: docs-api-check

on:
  pull_request:
    paths:
      - "src/**/*.ts"
      - "scripts/generate-api-docs.js"
      - "package.json"
      - "package-lock.json"
  push:
    branches:
      - master
    paths:
      - "src/**/*.ts"
      - "scripts/generate-api-docs.js"
      - "package.json"
      - "package-lock.json"

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify generated API docs are up-to-date
        run: npm run docs:api:check
